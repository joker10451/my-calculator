name: Deploy to GitHub Pages (DISABLED - migrated to Cloudflare Pages)

# DISABLED: Site migrated to Cloudflare Pages for better SEO (proper 200 status for SPA routes)
# To re-enable, uncomment the 'on' section below
# on:
#   push:
#     branches: [ main ]
#   workflow_dispatch:

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'This workflow is disabled. Site uses Cloudflare Pages now.'
        required: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build
        run: npm run build
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
